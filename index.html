<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="كثافة السوائل">
<meta name="theme-color" content="#4a9fd0">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>الكتلة الحجمية للسوائل – PhysicLabDZ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  width:100vw;height:100vh;overflow:hidden;
  background:linear-gradient(175deg,#a8d8f0 0%,#6ab4e0 50%,#4a9fd0 100%);
  font-family:'Tajawal',sans-serif;
  touch-action:none;
}

/* ── SURFACE ── */
#surface{
  position:fixed;bottom:0;left:0;right:0;
  height:9vh;
  background:linear-gradient(180deg,#d2d2d2 0%,#b8b8b8 100%);
  border-top:2.5px solid #a0a0a0;
  box-shadow:0 -3px 16px rgba(0,0,0,0.2);
  z-index:5;
}
#logo{
  position:absolute;bottom:7px;left:12px;
  font-size:10px;color:#999;letter-spacing:1.5px;font-weight:700;
}

/* ── PANEL (top-right) ── */
#panel{
  position:fixed;top:10px;right:10px;
  width:160px;
  background:rgba(255,255,255,0.28);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.55);
  border-radius:14px;padding:12px 14px;
  z-index:20;
  box-shadow:0 4px 20px rgba(0,0,0,0.12);
}
#panel .lbl{font-size:11px;color:#1a4a7a;font-weight:700;margin-bottom:4px;display:block;}
#panel select{
  width:100%;padding:5px 8px;border-radius:8px;
  border:1.5px solid rgba(100,160,220,0.5);
  background:rgba(255,255,255,0.85);
  font-family:'Tajawal',sans-serif;font-size:13px;color:#222;
  outline:none;direction:rtl;margin-bottom:9px;cursor:pointer;
}
.field{
  background:rgba(255,255,255,0.6);
  border:1.5px solid rgba(100,160,220,0.35);
  border-radius:8px;padding:5px 9px;
  margin-bottom:7px;
  display:flex;justify-content:space-between;align-items:center;
}
.field .fl{font-size:10px;color:#5577aa;}
.field .fv{font-weight:700;font-size:13px;color:#111;}
#fv-density{color:#c03000;}

/* ── MAIN CANVAS ── */
#main{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;touch-action:none;}



/* ── DESKTOP LAYOUT ── */
@media (min-width: 768px) {
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1a2a3a 0%, #0d1a2a 100%);
  }
  /* غلاف يحاكي شاشة الجهاز */
  #app-frame {
    position: relative;
    width: min(480px, 90vw);
    height: min(860px, 95vh);
    border-radius: 36px;
    overflow: hidden;
    box-shadow:
      0 0 0 10px #2a3a4a,
      0 0 0 12px #1a2a3a,
      0 30px 80px rgba(0,0,0,0.7),
      0 0 40px rgba(74,159,208,0.15);
  }
  /* الكانفاس يملأ الإطار */
  #main {
    border-radius: 0;
  }
  /* السطح والبانل يبقيان في أماكنهما بداخل الإطار */
  #surface {
    border-radius: 0 0 26px 26px;
  }
  #panel {
    top: 14px;
    right: 14px;
  }
  /* زر التفريغ */
  #emptyBtn {
    font-size: 12px;
    padding: 6px 14px;
  }
  /* شريط العنوان فوق الإطار */
  #desktop-bar {
    display: flex !important;
  }
}

@media (max-width: 767px) {
  #app-frame { display: contents; }
  #desktop-bar { display: none !important; }
}

/* شريط العنوان */
#desktop-bar {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 44px;
  background: rgba(10,20,35,0.85);
  backdrop-filter: blur(10px);
  align-items: center;
  justify-content: center;
  z-index: 100;
  border-radius: 36px 36px 0 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
#desktop-bar span {
  font-family: 'Tajawal', sans-serif;
  font-size: 13px;
  color: rgba(255,255,255,0.75);
  letter-spacing: 0.5px;
}
#desktop-bar .dot {
  width: 10px; height: 10px; border-radius: 50%;
  margin: 0 3px;
}
.dot-r { background: #ff5f57; }
.dot-y { background: #febc2e; }
.dot-g { background: #28c840; }
#dots { display: flex; position: absolute; right: 16px; }

</style>
</head>
<body>

<div id="app-frame">
<div id="desktop-bar"><div id="dots"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div></div><span>الكتلة الحجمية للسوائل – PhysicLabDZ</span></div>
<div id="surface"><div id="logo">PHYSICLABDZ</div></div>
<button id="emptyBtn" onclick="animateCylEmpty()" style="
  position:fixed;
  top:10px;
  left:8px;
  z-index:30;
  background:rgba(255,80,60,0.82);
  color:white;
  border:none;
  border-radius:20px;
  padding:5px 12px;
  font-size:11px;
  font-family:'Tajawal',sans-serif;
  font-weight:700;
  box-shadow:0 2px 8px rgba(0,0,0,0.18);
  cursor:pointer;
  touch-action:manipulation;
">تفريغ ↺</button>

<div id="panel">
  <span class="lbl">السائل:</span>
  <select id="liqSel">
    <option value="water">ماء</option>
    <option value="oil">زيت</option>
    <option value="alcohol">كحول</option>
    <option value="mercury">زئبق</option>
  </select>
  <div class="field"><span class="fl">الحجم</span><span class="fv" id="fv-vol">0 ml</span></div>
  <div class="field"><span class="fl">ρ (g/ml)</span><span class="fv" id="fv-density">—</span></div>
</div>

<canvas id="main"></canvas>


<script>
// ══════════════════════════════════════════════════
// SETUP
// ══════════════════════════════════════════════════
const canvas = document.getElementById('main');
const ctx = canvas.getContext('2d');

const LIQUIDS = {
  water:   {name:'ماء',   color:'rgba(60,130,255,0.7)',  border:'rgba(30,90,220,0.9)',   density:1.00},
  oil:     {name:'زيت',  color:'rgba(200,165,20,0.78)', border:'rgba(160,125,0,0.9)',   density:0.87},
  alcohol: {name:'كحول', color:'rgba(170,60,210,0.68)', border:'rgba(130,20,180,0.85)', density:0.79},
  mercury: {name:'زئبق', color:'rgba(155,165,175,0.92)',border:'rgba(100,110,125,0.95)',density:13.6},
};

let W,H,SH; // screen dims, surface height

function resize(){
  const frame = document.getElementById('app-frame');
  const useFrame = frame && frame.style.display !== 'contents' && window.innerWidth >= 768;
  if(useFrame){
    const r = frame.getBoundingClientRect();
    W = canvas.width  = r.width  || frame.offsetWidth;
    H = canvas.height = r.height || frame.offsetHeight;
  } else {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  SH = H*0.09;
  initLayout();
}
window.addEventListener('resize',resize);

// ══════════════════════════════════════════════════
// LAYOUT VARS (all computed from screen size)
// ══════════════════════════════════════════════════

// Graduated cylinder (left)
let CYL = {};
// Scale (right-center)
let SCALE = {};
// Beaker
let BK = {};
// Faucet
let TAP = {};

function initLayout(){
  const groundY = H - SH; // top of surface

  // ── Cylinder (left 20% of screen)
  const cylW = Math.min(56, W*0.12);
  const cylH = Math.min(220, H*0.38);
  CYL = {
    x: W*0.09,           // center x
    y: groundY - 10,     // فوق السطح بمقدار ارتفاع القاعدة
    w: cylW,
    h: cylH,
    layers: CYL.layers || [],  // preserve liquid layers
    tilt: 0,
  };

  // ── Scale (right area, centered ~65% of screen)
  const scW = Math.min(120, W*0.3);
  const scBodyH = 40;
  const scH = 8;
  // platY = الحافة العليا للمنصة = قاع البيشر
  const platTop = groundY - scBodyH - scH;
  SCALE = {
    cx: W*0.65,
    platY: platTop,      // قمة المنصة = قاع البيشر
    platW: scW,
    platH: scH,
    bodyH: scBodyH,
  };

  // ── Beaker
  const bkW = Math.min(80, W*0.2);
  const bkH = Math.min(120, H*0.22);
  // كتلة البيشر: زجاج بكثافة 2.5 g/cm³ وسُمك 3mm
  // نحوّل pixel إلى cm (1cm ≈ 10px تقريبياً)
  const pxToCm = 0.1;
  const wallT = 0.3; // سُمك الجدار بالسم
  const glassD = 2.5; // كثافة الزجاج g/cm³
  const bkWcm = bkW * pxToCm;
  const bkHcm = bkH * pxToCm;
  // حجم الزجاج = (محيط × ارتفاع × سُمك) + (قاع)
  const glassVol = (2*(bkWcm + bkWcm*0.8) * bkHcm * wallT) + (bkWcm * bkWcm*0.8 * wallT);
  const beakerMass = parseFloat((glassVol * glassD).toFixed(1));

  BK = {
    w: bkW, h: bkH,
    x: SCALE.cx,
    y: platTop - bkH,
    volume: BK.volume || 0,
    maxVol: 250,
    mass: BK.mass || beakerMass, // كتلة البيشر الزجاجية
    dragging: false,
    dragOX:0, dragOY:0,
    tilt: 0,
    pouring: false,
  };

  // ── Faucet (above beaker)
  TAP = {
    cx: SCALE.cx,
    y: groundY - bkH - 90,  // above beaker
    open: false,
    knobDragging: false,
    knobY0: 0,
  };
}

// ══════════════════════════════════════════════════
// STREAM PARTICLES
// ══════════════════════════════════════════════════
let particles = [];
function spawnStream(x,y,tx,ty,liq){
  for(let i=0;i<2;i++){
    const t = i/4;
    particles.push({
      x: x+(Math.random()-0.5)*4,
      y: y+t*20,
      vx:(tx-x)*0.05+(Math.random()-0.5),
      vy:3+Math.random()*3,
      r:3+Math.random()*2,
      life:1,
      color:LIQUIDS[liq].color
    });
  }
}
function updateParticles(dt){
  const groundY = H - SH;
  particles=particles.filter(p=>p.life>0.05);
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.35;
    p.life-=dt/600;
    // منع القطرات من اختراق السطح الأفقي
    if(p.y > groundY){ p.life=0; }
    // منع القطرات من الخروج خارج المخبار أثناء السكب
    if(p.y > CYL.y - CYL.h + 5 && Math.abs(p.x - CYL.x) < CYL.w/2 + 4){
      p.vy = 0; p.vx = 0; p.life -= 0.15;
    }
  }
}

// ══════════════════════════════════════════════════
// DRAWING HELPERS
// ══════════════════════════════════════════════════

// Generic glass vessel fill + glass walls
function drawGlassVessel(cx,botY,w,h,layers,maxVol,drawTicksFn){
  // trapezoid: top slightly wider
  const tw = w+8, bw = w;
  const topY = botY - h;
  function xLeft(y){ return cx - bw/2 + (bw-tw)/2*(y-botY)/(topY-botY)*-1; }
  // Actually: at topY => cx - tw/2, at botY => cx - bw/2
  function xl(y){ const t=(y-botY)/(topY-botY); return cx-(bw/2+(tw-bw)/2*t); }
  function xr(y){ const t=(y-botY)/(topY-botY); return cx+(bw/2+(tw-bw)/2*t); }

  // clip path
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(xl(topY), topY);
  ctx.lineTo(xl(botY), botY);
  ctx.lineTo(xr(botY), botY);
  ctx.lineTo(xr(topY), topY);
  ctx.closePath();
  ctx.clip();

  // liquid layers (sorted heavy→bottom)
  let cumVol = 0;
  const fillH = h - 15;
  for(const layer of layers){
    const liq = LIQUIDS[layer.liq];
    const y1 = botY - cumVol/maxVol*fillH;
    const y0 = botY - (cumVol+layer.vol)/maxVol*fillH;
    ctx.fillStyle = liq.color;
    ctx.beginPath();
    ctx.moveTo(xl(y0),y0); ctx.lineTo(xl(y1),y1);
    ctx.lineTo(xr(y1),y1); ctx.lineTo(xr(y0),y0);
    ctx.closePath(); ctx.fill();
    // meniscus
    ctx.strokeStyle = liq.border; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(xl(y0)+2,y0);
    ctx.quadraticCurveTo(cx,y0+5,xr(y0)-2,y0);
    ctx.stroke();
    cumVol += layer.vol;
  }
  ctx.restore();

  // glass walls (transparent stroke)
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(xl(topY), topY);
  ctx.lineTo(xl(botY), botY);
  ctx.lineTo(xr(botY), botY);
  ctx.lineTo(xr(topY), topY);
  ctx.closePath();
  ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=3; ctx.stroke();
  ctx.strokeStyle='rgba(180,220,240,0.5)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();

  // highlight
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(xl(topY)+8,topY+12);
  ctx.lineTo(xl(botY)+6,botY-6);
  ctx.stroke(); ctx.restore();

  // tick marks
  if(drawTicksFn) drawTicksFn(xl,xr,topY,botY);

  // ml label italic
  ctx.save();
  ctx.fillStyle='rgba(80,130,200,0.65)';
  ctx.font='italic 11px Georgia,serif';
  ctx.textAlign='center';
  ctx.fillText('ml', cx, topY+16);
  ctx.restore();

  // rim
  ctx.save();
  ctx.strokeStyle='rgba(220,240,255,0.85)'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(xl(topY)-2,topY); ctx.lineTo(xr(topY)+2,topY); ctx.stroke();
  ctx.restore();
}

function drawBeakerShape(){
  const cx = BK.x, botY = BK.y + BK.h, topY = BK.y;
  const layers = BK.volume>0 ? [{liq:currentLiq, vol:BK.volume}] : [];
  drawGlassVessel(cx, botY, BK.w, BK.h, layers, BK.maxVol, (xl,xr,ty,by)=>{
    // 4 ticks right side
    for(let i=1;i<=4;i++){
      const ty2 = by-(by-ty)*i/4;
      ctx.save(); ctx.strokeStyle='rgba(100,150,200,0.5)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(xr(ty2)-13,ty2); ctx.lineTo(xr(ty2)-2,ty2); ctx.stroke(); ctx.restore();
    }
  });
}

function drawCylinderShape(){
  const cx = CYL.x, botY = CYL.y, topY = CYL.y - CYL.h;
  const maxVol = 500;
  drawGlassVessel(cx, botY, CYL.w, CYL.h, CYL.layers, maxVol, (xl,xr,ty,by)=>{
    for(let i=1;i<=8;i++){
      const ty2 = by-(by-ty)*i/8;
      const long = i%2===0;
      ctx.save(); ctx.strokeStyle='rgba(100,150,200,0.5)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(xr(ty2)-(long?14:8),ty2); ctx.lineTo(xr(ty2)-1,ty2); ctx.stroke(); ctx.restore();
    }
  });
  // base
  ctx.save();
  ctx.fillStyle='rgba(180,210,225,0.45)';
  ctx.fillRect(cx-CYL.w/2-4, botY, CYL.w+8, 10);
  ctx.strokeStyle='rgba(150,190,210,0.6)'; ctx.lineWidth=1.5;
  ctx.strokeRect(cx-CYL.w/2-4, botY, CYL.w+8, 10);
  ctx.restore();
}

function drawScale(){
  const cx = SCALE.cx;
  const pY = SCALE.platY, pH = SCALE.platH, pW = SCALE.platW;
  const bH = SCALE.bodyH;
  const groundY = H - SH;

  // ── جسم الميزان: مستطيل بسيط فوق السطح
  ctx.save();
  ctx.fillStyle = '#c8c8c8';
  ctx.beginPath();
  ctx.roundRect(cx - pW/2, groundY - bH, pW, bH, [4,4,0,0]);
  ctx.fill();
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.5; ctx.stroke();

  // ── شاشة LCD داخل الجسم
  const sw = pW * 0.78, sh = 22;
  const sx = cx - sw/2, sy = groundY - bH + (bH - sh)/2;
  ctx.fillStyle = '#0a1a0a';
  ctx.beginPath(); ctx.roundRect(sx, sy, sw, sh, 3); ctx.fill();
  ctx.strokeStyle = '#1a3a1a'; ctx.lineWidth = 1; ctx.stroke();
  const mass = displayedMass;
  ctx.fillStyle = mass < -0.05 ? '#ff4444' : '#00dd66';
  ctx.shadowColor = mass < -0.05 ? '#ff0000' : '#00ff88';
  ctx.shadowBlur = 6;
  ctx.font = 'bold 14px "Courier New",monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(mass.toFixed(1) + ' g', cx, sy + sh/2);
  ctx.shadowBlur = 0;
  ctx.restore();

  // ── منصة الوزن فوق الجسم
  ctx.save();
  ctx.fillStyle = '#d5d5d5';
  ctx.beginPath();
  ctx.roundRect(cx - pW/2 - 4, pY, pW + 8, pH, [3,3,2,2]);
  ctx.fill();
  ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();
}

function drawFaucet(){
  const cx = TAP.cx, y = TAP.y;
  const fw=62, fh=26;

  // Pipe
  ctx.save();
  ctx.strokeStyle='rgba(140,150,160,0.8)'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(cx,y-30); ctx.lineTo(cx,y); ctx.stroke();
  ctx.restore();

  // Body
  const fg = ctx.createLinearGradient(cx-fw/2,y,cx+fw/2,y+fh);
  fg.addColorStop(0,'#d0d0d0'); fg.addColorStop(0.5,'#e8e8e8'); fg.addColorStop(1,'#b0b0b0');
  ctx.save();
  ctx.fillStyle=fg;
  ctx.beginPath(); ctx.roundRect(cx-fw/2,y,fw,fh,6); ctx.fill();
  ctx.strokeStyle='#999'; ctx.lineWidth=1.5; ctx.stroke();

  // Nozzle
  ctx.fillStyle='#aaa';
  ctx.beginPath(); ctx.roundRect(cx-5,y+fh,10,12,[0,0,5,5]); ctx.fill();
  ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.stroke();

  // Knob (circle on right)
  const kx = cx+fw/2+14, ky = y+fh/2;
  const kr = 12;
  const kg = ctx.createRadialGradient(kx-3,ky-3,1,kx,ky,kr);
  kg.addColorStop(0,'#eee'); kg.addColorStop(1,'#888');
  ctx.fillStyle=kg;
  ctx.beginPath(); ctx.arc(kx,ky,kr,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#666'; ctx.lineWidth=1.5; ctx.stroke();
  // rotation mark
  const angle = TAP.open ? Math.PI/4 : 0;
  ctx.strokeStyle='#555'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(kx+Math.cos(angle)*(kr-3),ky+Math.sin(angle)*(kr-3));
  ctx.lineTo(kx-Math.cos(angle)*(kr-3),ky-Math.sin(angle)*(kr-3));
  ctx.stroke();
  ctx.restore();

  // Water stream when open
  if(TAP.open){
    const streamTop = y+fh+12;
    const streamBot = BK.y; // top of beaker
    if(streamBot > streamTop){
      const sg = ctx.createLinearGradient(cx,streamTop,cx,streamBot);
      sg.addColorStop(0,LIQUIDS[currentLiq].color);
      sg.addColorStop(1,'rgba(100,180,255,0)');
      ctx.save();
      ctx.fillStyle=sg;
      const sw2=6+Math.random()*2;
      ctx.beginPath();
      ctx.moveTo(cx-sw2/2,streamTop);
      ctx.lineTo(cx-sw2/4,streamBot);
      ctx.lineTo(cx+sw2/4,streamBot);
      ctx.lineTo(cx+sw2/2,streamTop);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  }
}


// ══════════════════════════════════════════════════
// AUDIO

// تخصيصات الصوت حسب السائل
// pourRate: سرعة التشغيل | pourVol: مستوى الصوت (0-1)
const LIQ_AUDIO = {
  water:   { pourRate: 1.00, pourVol: 0.85, quickRate: 1.00, quickVol: 0.90 },
  oil:     { pourRate: 0.80, pourVol: 0.70, quickRate: 0.75, quickVol: 0.80 },
  alcohol: { pourRate: 1.15, pourVol: 0.75, quickRate: 1.10, quickVol: 0.85 },
  mercury: { pourRate: 0.60, pourVol: 1.00, quickRate: 0.55, quickVol: 1.00 },
};

AUDIO.pourbeaker.loop = true;

function audioApplyLiq(liq){
  const c = LIQ_AUDIO[liq] || LIQ_AUDIO.water;
  AUDIO.pourbeaker.playbackRate = c.pourRate;
  AUDIO.pourbeaker.volume       = c.pourVol;
  AUDIO.quickpour.playbackRate  = c.quickRate;
  AUDIO.quickpour.volume        = c.quickVol;
}
function playFill(){
  audioApplyLiq(currentLiq);
  if(AUDIO.pourbeaker.paused){
    AUDIO.pourbeaker.currentTime = 0;
    AUDIO.pourbeaker.play().catch(()=>{});
  }
}
function stopFill(){
  AUDIO.pourbeaker.pause();
  AUDIO.pourbeaker.currentTime = 0;
}
function playQuick(){
  audioApplyLiq(currentLiq);
  AUDIO.quickpour.currentTime = 0;
  AUDIO.quickpour.play().catch(()=>{});
}

// STATE
// ══════════════════════════════════════════════════
let currentLiq = 'water';
let displayedMass = 0;
let targetMass = 0;
let pourAnim = null; // animation state for pour

// Collision: beaker rests on scale platform
function applyBeakerPhysics(){
  if(BK.dragging || BK.pouring) return;
  const groundY = H - SH;
  BK_vy += 0.6; // جاذبية
  BK.y += BK_vy;

  // تصادم مع السطح الأفقي
  if(BK.y + BK.h >= groundY){
    BK.y = groundY - BK.h;
    BK_vy = 0;
  }

  // تصادم مع منصة الميزان — platY هي قمة المنصة
  const distSc = Math.abs(BK.x - SCALE.cx);
  if(distSc < SCALE.platW/2 + BK.w/2 - 10){
    if(BK.y + BK.h >= SCALE.platY){
      BK.y = SCALE.platY - BK.h;
      BK_vy = 0;
    }
  }
}

function enforceBeakerOnScale(){
  // لا شيء — applyBeakerPhysics تتولى الأمر
}

function computeTargetMass(){
  const liq = LIQUIDS[currentLiq];
  const dist = Math.abs(BK.x - SCALE.cx);
  const onScale = dist < SCALE.platW/2 + 10 &&
                  Math.abs((BK.y + BK.h) - SCALE.platY) < 10;
  if(onScale){
    // البيشر على الميزان = كفة → الميزان يعرض كتلة السائل فقط (صافي)
    targetMass = BK.volume * liq.density;
  } else {
    // البيشر مرفوع → الميزان يفقد كتلة البيشر فيشير بالسالب
    targetMass = -(BK.mass || 0);
  }
}

// ══════════════════════════════════════════════════
// POUR ANIMATION — تلقائي عند الاقتراب من فوهة المخبار
// ══════════════════════════════════════════════════
let pourDone = false; // منع السكب المزدوج في نفس المرور
let BK_vy = 0; // سرعة عمودية للبيشر عند الإفلات

function isOverCylMouth(){
  const mouthX = CYL.x;
  const mouthY = CYL.y - CYL.h;
  return (
    Math.abs(BK.x - mouthX) < BK.w * 0.9 &&
    BK.y + BK.h > mouthY - BK.h * 1.2 &&
    BK.y + BK.h < mouthY + 10
  );
}

function doPourTilt(){
  if(BK.volume <= 0 || BK.pouring) return;
  BK.pouring = true;
  pourDone = false;
  playQuick();
  const pourVol = BK.volume;
  let transferred = false;
  const dur = 1200;
  let t0 = null;
  // دائماً نحو اليسار بزاوية كافية للسكب في المخبار
  const tiltAngle = -130;
  function step(ts){
    if(!t0) t0 = ts;
    const t = Math.min((ts-t0)/dur, 1);
    BK.tilt = tiltAngle * Math.sin(t * Math.PI);
    if(t > 0.35 && !transferred){
      transferred = true;
      addToCylinder(currentLiq, pourVol);
      BK.volume = 0;
      updatePanel();
    }
    if(t > 0.25 && t < 0.75){
      spawnStream(BK.x - BK.w*0.6, BK.y + BK.h*0.3, CYL.x, CYL.y - CYL.h + 10, currentLiq);
    }
    if(t < 1){
      requestAnimationFrame(step);
    } else {
      BK.tilt = 0;
      BK.pouring = false;
      pourDone = true;
      BK_vy = 0; // منع تراكم السرعة أثناء الأنيميشن
    }
  }
  requestAnimationFrame(step);
}

function addToCylinder(liq, vol){
  // Merge if same top layer
  const layers = CYL.layers;
  if(layers.length>0 && layers[layers.length-1].liq===liq){
    layers[layers.length-1].vol += vol;
  } else {
    layers.push({liq,vol});
  }
  // Sort by density desc (heaviest at bottom)
  layers.sort((a,b)=>LIQUIDS[b.liq].density - LIQUIDS[a.liq].density);
}

function easeOut(t){ return 1-Math.pow(1-t,3); }

// ══════════════════════════════════════════════════
// CYLINDER TILT (drag to empty)
// ══════════════════════════════════════════════════
let cylTiltDrag = null;
let cylEmptyAnim = false;

function emptyCylinder(){
  CYL.layers=[];
}

function animateCylEmpty(){
  if(cylEmptyAnim) return;
  cylEmptyAnim = true;
  playQuick();
  const dur = 900;
  let t0 = null;
  function step(ts){
    if(!t0) t0=ts;
    const t = Math.min((ts-t0)/dur, 1);
    // دوران إلى اليسار: 0 → -130 → 0
    CYL.tilt = -130 * Math.sin(t * Math.PI);
    if(t > 0.3 && t < 0.7) emptyCylinder();
    if(t < 1){ requestAnimationFrame(step); }
    else { CYL.tilt=0; cylEmptyAnim=false; }
  }
  requestAnimationFrame(step);
}

function springCylinder(){
  const start = CYL.tilt;
  const t0=performance.now();
  function s(now){
    const t=Math.min((now-t0)/400,1);
    CYL.tilt=start*(1-easeOut(t));
    if(t<1) requestAnimationFrame(s);
    else CYL.tilt=0;
  }
  requestAnimationFrame(s);
}

// ══════════════════════════════════════════════════
// INPUT HANDLING
// ══════════════════════════════════════════════════
function getXY(e){
  const r=canvas.getBoundingClientRect();
  if(e.touches) return {x:e.touches[0].clientX-r.left, y:e.touches[0].clientY-r.top};
  return {x:e.clientX-r.left, y:e.clientY-r.top};
}

let faucetKnobDrag = null;

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('touchstart', onDown, {passive:false});
function onDown(e){
  e.preventDefault();
  const {x,y} = getXY(e);

  // Faucet knob
  const kx=TAP.cx+31+10, ky=TAP.y+13;
  if(Math.hypot(x-kx,y-ky)<20){
    faucetKnobDrag={y0:y, open:TAP.open};
    return;
  }

  // Beaker drag
  if(!BK.pouring && x>BK.x-BK.w/2-10 && x<BK.x+BK.w/2+10 && y>BK.y-10 && y<BK.y+BK.h+10){
    BK.dragging=true;
    BK.dragOX=x-BK.x; BK.dragOY=y-BK.y;
    BK_vy=0;
    TAP.open=false;
    stopFill();
    return;
  }

  // Cylinder tilt
  const cylX=CYL.x, cylBotY=CYL.y, cylTopY=CYL.y-CYL.h;
  if(x>cylX-CYL.w/2-15 && x<cylX+CYL.w/2+15 && y>cylTopY-15 && y<cylBotY+15){
    cylTiltDrag={x0:x, tilt0:CYL.tilt};
    return;
  }
}

document.addEventListener('mousemove', onMove);
document.addEventListener('touchmove', onMove, {passive:false});
function onMove(e){
  e.preventDefault();
  const {x,y} = getXY(e);

  // Faucet knob
  if(faucetKnobDrag!==null){
    const dy = y-faucetKnobDrag.y0;
    if(dy>12) TAP.open=true;
    else if(dy<-8){ TAP.open=false; stopFill(); }
    return;
  }

  // Beaker drag
  if(BK.dragging){
    BK.x = x - BK.dragOX;
    BK.y = y - BK.dragOY;

    // ── clamp: منع اختراق الأسطح الصلبة أثناء السحب ──
    const groundY = H - SH;
    // السطح الأفقي
    if(BK.y + BK.h > groundY) BK.y = groundY - BK.h;
    // منصة الميزان
    const distSc = Math.abs(BK.x - SCALE.cx);
    if(distSc < SCALE.platW/2 + BK.w/2 - 10){
      if(BK.y + BK.h > SCALE.platY) BK.y = SCALE.platY - BK.h;
    }

    // سكب تلقائي عند الاقتراب من فوهة المخبار
    if(isOverCylMouth() && BK.volume > 0 && !BK.pouring && !pourDone){
      doPourTilt();
    }
    return;
  }

  // Cylinder tilt drag
  if(cylTiltDrag){
    const dx=x-cylTiltDrag.x0;
    CYL.tilt=Math.max(-130,Math.min(0, cylTiltDrag.tilt0+dx*0.7));
    if(CYL.tilt<-100) emptyCylinder();
    return;
  }
}

document.addEventListener('mouseup', onUp);
document.addEventListener('touchend', onUp);
function onUp(e){
  if(faucetKnobDrag!==null){ faucetKnobDrag=null; return; }

  if(cylTiltDrag){ cylTiltDrag=null; springCylinder(); return; }

  if(BK.dragging){
    BK.dragging = false;
    pourDone = false;
    BK_vy = 0; // تبدأ الجاذبية من الإفلات
  }
}

function snapToScale(){
  const tx=SCALE.cx, ty=SCALE.platY-BK.h;
  const sx=BK.x, sy=BK.y;
  const dur=450; let t0=null;
  function s(ts){
    if(!t0) t0=ts;
    const t=Math.min((ts-t0)/dur,1);
    const e=easeOut(t);
    BK.x=sx+(tx-sx)*e; BK.y=sy+(ty-sy)*e;
    if(t<1) requestAnimationFrame(s);
    else { BK.x=tx; BK.y=ty; }
  }
  requestAnimationFrame(s);
}

// ══════════════════════════════════════════════════
// FILL LOGIC
// ══════════════════════════════════════════════════
let lastFill=0;
function doFill(now){
  if(!TAP.open) return;
  if(BK.pouring) return;
  const dt = now-lastFill;
  if(dt<=0||dt>200){ lastFill=now; return; }
  lastFill=now;

  // Beaker center must be roughly under nozzle
  const nozzleX=TAP.cx, nozzleY=TAP.y+38;
  const beakerTop=BK.y;
  const underFaucet = Math.abs(BK.x-nozzleX)<BK.w/2+8 && beakerTop<nozzleY+180 && beakerTop>nozzleY-20;
  if(!underFaucet) return;

  const rate=14; // ml/s
  playFill();
  BK.volume=Math.min(BK.maxVol, BK.volume+rate*dt/1000);
  updatePanel();
  if(BK.volume>=BK.maxVol){ TAP.open=false; stopFill(); }
}

function updatePanel(){
  const liq=LIQUIDS[currentLiq];
  document.getElementById('fv-vol').textContent = BK.volume.toFixed(0)+' ml';
  document.getElementById('fv-density').textContent = BK.volume>0 ? liq.density.toFixed(2)+' g/ml' : '—';
}

document.getElementById('liqSel').addEventListener('change',e=>{
  currentLiq=e.target.value;
  BK.volume=0; TAP.open=false;
  stopFill();
  updatePanel();
});

// ══════════════════════════════════════════════════
// MAIN RENDER LOOP
// ══════════════════════════════════════════════════
let prevTs=0;
function loop(ts){
  const dt=ts-prevTs; prevTs=ts;
  doFill(ts);
  applyBeakerPhysics();
  computeTargetMass();
  displayedMass += (targetMass-displayedMass)*0.1;
  if(Math.abs(displayedMass-targetMass)<0.05) displayedMass=targetMass;
  updateParticles(dt);
  render();
  requestAnimationFrame(loop);
}

function render(){
  ctx.clearRect(0,0,W,H);

  // تحديث موضع زر التفريغ فوق المخبار
  const btn = document.getElementById('emptyBtn');
  if(btn){
    const cylTop = CYL.y - CYL.h;
    btn.style.top = Math.max(8, cylTop - 90) + 'px';
    btn.style.left = (CYL.x - CYL.w/2) + 'px';
  }

  // Draw cylinder (with tilt transform)
  ctx.save();
  ctx.translate(CYL.x, CYL.y);
  ctx.rotate(CYL.tilt*Math.PI/180);
  ctx.translate(-CYL.x,-CYL.y);
  drawCylinderShape();
  ctx.restore();

  // Draw scale
  drawScale();

  // Draw faucet
  drawFaucet();

  // Draw beaker (with pour tilt)
  ctx.save();
  ctx.translate(BK.x, BK.y+BK.h/2);
  ctx.rotate(BK.tilt*Math.PI/180);
  ctx.translate(-BK.x, -(BK.y+BK.h/2));
  drawBeakerShape();
  ctx.restore();

  // Particles
  ctx.save();
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life)*0.9;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.restore();
}

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
// polyfill roundRect if needed
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    const ra=typeof r==='number'?[r,r,r,r]:r.concat(r).slice(0,4);
    this.beginPath();
    this.moveTo(x+ra[0],y);
    this.lineTo(x+w-ra[1],y); this.arcTo(x+w,y,x+w,y+ra[1],ra[1]);
    this.lineTo(x+w,y+h-ra[2]); this.arcTo(x+w,y+h,x+w-ra[2],y+h,ra[2]);
    this.lineTo(x+ra[3],y+h); this.arcTo(x,y+h,x,y+h-ra[3],ra[3]);
    this.lineTo(x,y+ra[0]); this.arcTo(x,y,x+ra[0],y,ra[0]);
    this.closePath();
    return this;
  };
}

resize();
requestAnimationFrame(loop);

// ── PWA: تسجيل Service Worker ──
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(()=>{});
  });
}
</script>
</div><!-- /app-frame -->
